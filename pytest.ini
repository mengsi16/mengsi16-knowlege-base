[pytest]
# brain-base pytest configuration (P0-2 smoke tests).
#
# Usage:
#   pytest                        — run all offline smoke tests
#   pytest tests/smoke -q         — quick offline suite (<2s)
#   pytest -m "not requires_milvus" — explicitly skip Milvus-backed tests
#   pytest -m requires_milvus     — run only Milvus-backed tests (need Milvus up)

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    offline: smoke tests that do not touch Milvus or the network
    requires_milvus: tests that require a live Milvus instance (skipped by default)
    slow: tests that take >2s to run

# By default, skip Milvus tests so CI / dev machines without Milvus still pass.
addopts = -ra -m "not requires_milvus"
