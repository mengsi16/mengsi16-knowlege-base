services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.14
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    # Milvus compaction: 自动合并小 segment，控制存储膨胀
    # 默认已开启（dataCoord.compaction.enable=true），可通过环境变量调整：
    #   COMMON_COMPACTION_ENABLE: "true"
    #   DATAcoord_COMPACTION_EXPIRED_TTL: "86400"  # 过期数据 compaction 间隔（秒）
    #   DATAcoord_COMPACTION_CLEANUP_TIMEOUT: "300"  # compaction 后清理超时
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  # ---------- brain-base worker ----------
  # 仅包含重依赖：Python + MinerU + bge-m3 + pymilvus + doc-converter
  # Claude Code + Playwright-cli 在本地 Windows 运行，不进容器。
  #
  # 架构：
  #   本地 Windows:  Claude Code + brain-base-cli.py + Playwright-cli
  #   Docker 容器:   Milvus 三件套 + 本容器（重依赖 worker）
  #
  # 本地调用 Claude Code：
  #   python bin/brain-base-cli.py ask "问题"
  # 容器内工具（Milvus 入库 / doc-converter / embedding）：
  #   docker compose exec brain-base-worker python bin/milvus-cli.py ingest-chunks ...
  #   docker compose exec brain-base-worker python bin/doc-converter.py check-runtime
  brain-base-worker:
    container_name: brain-base-worker
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      standalone:
        condition: service_healthy
    environment:
      KB_MILVUS_URI: http://milvus-standalone:19530
      KB_EMBEDDING_PROVIDER: ${KB_EMBEDDING_PROVIDER:-bge-m3}
      KB_EMBEDDING_DEVICE: ${KB_EMBEDDING_DEVICE:-cuda}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-1}
    volumes:
      # 数据持久化（知识库本体，本地和容器共享）
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data:/app/data
      # 模型缓存持久化（避免重建容器时重新下载 bge-m3 ~1.4GB + MinerU ~2GB）
      - ${HF_CACHE_DIR:-./volumes/huggingface}:/root/.cache/huggingface
      - ${MINERU_CACHE_DIR:-./volumes/mineru}:/root/.cache/mineru
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ---------- 数据清理策略 ----------
    # 1. Milvus 自动 compaction：standalone 默认开启，过期 segment 自动合并
    # 2. 文件系统清理：定期执行 remove-doc 删除过期文档（由上层 Agent 或 cron 触发）
    # 3. Docker 卷大小限制：
    #    - Linux: 在挂载目录所在分区设 quota，或用 tmpfs + size= 限制临时数据
    #    - Windows/WSL2: 在 .wslconfig 设 storageLimit（如 70GB），或定期清理 volumes/
    # 4. MinIO 对象存储：Milvus 默认 3.2GB 配额（ETCD_QUOTA_BACKEND_BYTES），
    #    MinIO 本身无上限，依赖磁盘分区大小

networks:
  default:
    name: milvus
