                  - listitem [ref=e700]:
                    - strong [ref=e701]: 生成+自检
                    - text: （步骤 8.5）：LLM 生成答案后自检三维度，不合格修正一轮。
                  - listitem [ref=e702]:
                    - strong [ref=e703]: 固化+自愈
                    - text: ：答案固化到整理层供短路返回；recall trace 触发后台补充 question 并重新入库。
