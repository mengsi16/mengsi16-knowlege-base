                  - listitem [ref=e711]:
                    - strong [ref=e712]: QA Agent
                    - text: ：先查自进化整理层的固化答案，未命中再对用户问题做 L0〜L3 fan-out 改写（原句 / 规范化 / 意图增强 / HyDE）并检索本地知识库，再决定是否补库。
                  - listitem [ref=e713]:
                    - strong [ref=e714]: Organize Agent （自进化整理层 / 固化层）
                    - text: ：对标 Karpathy LLM Wiki 模式。一次满意问答完成后，把答案、执行路径、遇到的坑固化为 Crystallized Skill；命中且新鲜 → 直接返回；命中但过期 → 携带原执行路径与坑指导 get-info-agent 精准刷新。
                  - listitem [ref=e715]:
                    - strong [ref=e716]: Get-Info Agent
                    - text: ：外部补库入口。作为调度器，基于站点优先级组织
                    - strong [ref=e717]: Playwright-cli
                    - text: 抓取、清洗、分块、合成 QA 生成和落盘。
                  - listitem [ref=e718]:
                    - strong [ref=e719]: Upload Agent
                    - text: ：用户本地文档入库入口（与 Get-Info Agent 平行）。接收 PDF / Word / PPT / Excel / LaTeX / TXT / MD / 图片，通过
                    - strong [ref=e720]: MinerU 3.x + pandoc
                    - text: 统一转换为 Markdown 后复用下游
                    - code [ref=e721]: knowledge-persistence
                    - text: 管道一致分块与入库。
                  - listitem [ref=e722]:
                    - strong [ref=e723]: Playwright-cli
                    - text: ：直接使用官方
                    - code [ref=e724]: playwright-cli
                    - text: 命令，遵循官方仓库推荐的安装与调用方式。
                  - listitem [ref=e725]:
                    - strong [ref=e726]: Milvus hybrid 索引（默认 bge-m3）
                    - text: ：dense + sparse 双路召回，支持 chunk 行 + 合成 question 行（doc2query）。
                  - listitem [ref=e727]:
                    - strong [ref=e728]: Question 自愈机制
                    - text: ：qa-agent 在回答后记录 recall trace；低分命中、无命中或用户负反馈时，通过独立
                    - code [ref=e729]: claude -p
                    - text: 后台进程触发
                    - code [ref=e730]: self-heal-workflow
                    - text: ，补充缺失维度的 question 并重新入库。
                  - listitem [ref=e731]:
                    - strong [ref=e732]: doc2query 权威索引
                    - text: ：
