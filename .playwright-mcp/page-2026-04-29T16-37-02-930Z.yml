                    - text: ：把多条 query 变体一次性丢给 CLI，自动并发检索、RRF 合并、按 chunk_id 去重。可选
                    - code [ref=e744]: "--rerank"
                    - text: 启用 bge-reranker-v2-m3 cross-encoder 语义重排序（软依赖，模型不可用时静默回退到纯 RRF）。
                  - listitem [ref=e745]:
                    - strong [ref=e746]: 复杂问题分解
                    - text: ：qa-workflow 步骤 1.5 识别四类复杂问题（多部/对比/因果链/方案选型），自动分解为 2〜4 个独立子问题，每个子问题独立走 L0-L3 改写与检索，最后合并证据生成综合答案。简单事实性问题不分解。
                  - listitem [ref=e747]:
                    - strong [ref=e748]: 答案质量自检（Maker-Checker 循环）
                    - text: ：qa-workflow 步骤 8.5 在生成答案后做结构化自检，评估忠实度（faithfulness）、完整性（completeness）、一致性（consistency）三维度；不合格则修正一轮，最多一轮；失败不阻断答案返回。结果写入 recall trace 的
                    - code [ref=e749]: answer_eval
                    - text: 字段。
