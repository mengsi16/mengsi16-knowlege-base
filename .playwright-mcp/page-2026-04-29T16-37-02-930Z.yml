                    - text: 是 questions 的权威来源；
                    - code [ref=e734]: ingest-chunks
                    - text: 优先读取该索引，chunk frontmatter 作为 fallback。
                  - listitem [ref=e735]:
                    - strong [ref=e736]: 召回评估与信源仲裁
                    - text: ：
                    - code [ref=e737]: eval-recall.py
                    - text: 支持 recall@K、6 维度 question 覆盖率评估、反馈沉淀；
                    - code [ref=e738]: source-priority.py
                    - text: 为 chunk 标注
                    - code [ref=e739]: source_priority
                    - text: 并检测潜在信源冲突。
                  - listitem [ref=e740]:
                    - strong [ref=e741]: 5000 字符分块阈值
                    - text: ：短文档不再被切碎（≤ 5000 字符整篇 1 块）；长文档按 Markdown 语义边界切分。
                  - listitem [ref=e742]:
