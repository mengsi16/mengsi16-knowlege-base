                  - text: 以下硬约束：
                - list [ref=e927]:
                  - listitem [ref=e928]:
                    - strong [ref=e929]: 正文 ≤ 5000 字符 → 整篇直接 1 个 chunk，不切。
                    - text: 这是为了避免短 MD 被无谓地切成多块。
                  - listitem [ref=e930]:
                    - strong [ref=e931]: 正文 > 5000 字符 → 按 Markdown 语义边界切
